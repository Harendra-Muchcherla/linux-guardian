# ===============================================
# Linux Guardian - Configuration File
# ===============================================

# Email Settings
ALERT_EMAIL="your-email@example.com"
SMTP_SERVER="smtp.gmail.com"
SMTP_PORT="587"
SMTP_USER="your-email@gmail.com"
SMTP_PASS="your-app-password"

# System Monitoring Thresholds
CPU_THRESHOLD=80          # Alert if CPU > 80%
MEMORY_THRESHOLD=85      # Alert if Memory > 85%
DISK_THRESHOLD=90        # Alert if Disk > 90%
LOAD_AVG_THRESHOLD=4     # Alert if Load Average > 4

# Process Monitoring
MAX_PROCESSES=500         # Alert if processes > 500
SUSPICIOUS_PROCESSES="nc|netcat|nmap|socat|pentestmonkey"

# Network Monitoring
MONITOR_PORTS="22,80,443,3306,5432,6379,8080"
BLOCKED_IPS=""           # Add IPs to block

# IDS Settings
CHECK_ROOTKITS=true
CHECK_FAILED_LOGINS=true
CHECK_SUSPICIOUS_PROCESSES=true
CHECK_UNUSUAL_PORTS=true

# Failed Login Threshold
FAILED_LOGIN_THRESHOLD=5

# Log Settings
LOG_DIR="./logs"
LOG_SYSTEM="system.log"
LOG_IDS="ids.log"
LOG_ALERTS="alerts.log"

# Dashboard Settings
REFRESH_INTERVAL=2       # Refresh every 2 seconds
DASHBOARD_STYLE="color"  # color or simple